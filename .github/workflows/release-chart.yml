name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'templates/**'
      - 'values.yaml'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Login to GHCR
        run: echo "${{ secrets.TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push
        run: |
          helm package .
          helm push seiri-kube-agent-*.tgz oci://ghcr.io/seiri-app/charts